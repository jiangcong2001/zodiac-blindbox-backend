services:
  - type: web
    name: zodiac-blindbox-backend
    env: node
    buildCommand: npm install && npm run db:init && npm run db:seed
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /data/data.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
